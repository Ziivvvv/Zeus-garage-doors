<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta — overridden per-page by SEOHead.tsx -->
  <title>Zeus Garage Doors | Washington State's Trusted Experts</title>
  <meta name="description" content="Expert garage door repair and installation across Washington State. Fast, reliable service from the pros at Zeus Garage Doors. Get a free quote today!" />

  <!-- Canonical — overridden per-page -->
  <link rel="canonical" href="https://zeusgaragedoorswa.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/zeus-logo-navbar.png" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Fonts: Playfair Display + DM Sans — preload critical -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Open Graph defaults (overridden by SEOHead.tsx per page) -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="Zeus Garage Doors" />
  <meta property="og:url" content="https://zeusgaragedoorswa.com/" />
  <meta property="og:title" content="Zeus Garage Doors | Washington State's Trusted Experts" />
  <meta property="og:description" content="Expert garage door repair and installation across Washington State. Fast, reliable service from the pros at Zeus Garage Doors. Get a free quote today!" />
  <meta property="og:image" content="https://zeusgaragedoorswa.com/zeus-logo-navbar.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Zeus Garage Doors | Washington State's Trusted Experts" />
  <meta name="twitter:description" content="Expert garage door repair and installation across Washington State. Fast, reliable service from the pros at Zeus Garage Doors. Get a free quote today!" />
  <meta name="twitter:image" content="https://zeusgaragedoorswa.com/zeus-logo-navbar.png" />

  <!-- Geo targeting -->
  <meta name="geo.region" content="US-WA" />
  <meta name="geo.placename" content="Kirkland" />
  <meta name="geo.position" content="47.6769;-122.2060" />
  <meta name="ICBM" content="47.6769, -122.2060" />

  <!-- Robots -->
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

  <!-- Theme color (mobile browser chrome) -->
  <meta name="theme-color" content="#1B2A3B" />

  <!-- Critical CSS: font-face variables for CLS prevention -->
  <style>
    :root {
      --color-navy: #1B2A3B;
      --color-gold: #C9A84C;
      --color-offwhite: #F9F7F4;
      --color-charcoal: #2D2D2D;
      --color-green: #2D6A4F;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-body);
      font-size: 17px;
      color: var(--color-charcoal);
      background-color: var(--color-offwhite);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-bottom: 0;
    }

    .font-playfair {
      font-family: var(--font-heading);
    }

    @media (max-width: 1024px) {
      body {
        padding-bottom: 72px;
      }
    }

    #root {
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #root.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        document.getElementById('root').classList.add('loaded');
      }, 50);
    });
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
